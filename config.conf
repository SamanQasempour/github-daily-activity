#!/bin/bash
# ============================================================================
# GitHub Daily Activity - Configuration File
# ============================================================================
# Description: Configuration settings for github-daily-activity
# Author: SamanQasempour
# License: MIT
# ============================================================================

# --------------------------------------------------------------------------
# Retry Settings
# --------------------------------------------------------------------------

# Retry interval in seconds when internet is unavailable
# Default: 1800 (30 minutes)
RETRY_INTERVAL=1800

# --------------------------------------------------------------------------
# Feature Toggles
# --------------------------------------------------------------------------

# Enable/disable public IP detection
# Options: true, false
ENABLE_PUBLIC_IP=true

# Enable/disable git pull before commit
# Options: true, false
ENABLE_PULL=true

# Enable/disable git push after commit
# Options: true, false
ENABLE_PUSH=true

# Enable/disable git commit
# Options: true, false
ENABLE_COMMIT=true

# --------------------------------------------------------------------------
# Logging Settings
# --------------------------------------------------------------------------

# Log level for activity.log
# Options: DEBUG, INFO, WARN, ERROR
LOG_LEVEL=INFO

# --------------------------------------------------------------------------
# Git Settings
# --------------------------------------------------------------------------

# Branch detection mode
# Options: AUTO (detect main/master automatically), main, master
BRANCH=AUTO

# Repository path (leave empty for auto-detection from script location)
REPO_PATH=""

# --------------------------------------------------------------------------
# History Settings
# --------------------------------------------------------------------------

# Name of the history file
HISTORY_FILE="history.log"

# --------------------------------------------------------------------------
# Network Settings
# --------------------------------------------------------------------------

# Host to ping for internet connectivity check
PING_HOST="github.com"

# Ping timeout in seconds
PING_TIMEOUT=5

# Number of ping attempts
PING_ATTEMPTS=3

# --------------------------------------------------------------------------
# Display Settings
# --------------------------------------------------------------------------

# Enable colored output
# Options: true, false
ENABLE_COLORS=true

# Enable verbose output
# Options: true, false
VERBOSE=false

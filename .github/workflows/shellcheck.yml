name: ShellCheck

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          echo "Running ShellCheck on all shell scripts..."
          shellcheck -s bash -x boot-log.sh install.sh uninstall.sh
          echo "ShellCheck completed successfully!"

      - name: Run ShellCheck with strict mode
        run: |
          echo "Running ShellCheck in strict mode..."
          shellcheck -s bash -S warning -x boot-log.sh install.sh uninstall.sh
          echo "Strict ShellCheck completed successfully!"
